server:
  port: 8080

spring:
  application:
    name: math-archive
  datasource:
    url: jdbc:mysql://localhost:3306/math_archive?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
